<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Valuator — Beer Value Calculator</title>

<!-- Web app / Home Screen install -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1c1410">

<!-- iOS / iPad Home Screen support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Valuator">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">

<!-- Apply the saved theme before first paint to avoid a flash of the wrong colours. -->
<script>
  (function () {
    try {
      var t = localStorage.getItem("beerValueCalc.theme");
      document.documentElement.setAttribute(
        "data-theme", (t === "light" || t === "dark") ? t : "auto");
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "auto");
    }
  })();
</script>
<style>
  /* Dark theme is the default (also used by "auto" when the system is dark). */
  :root {
    --bg: #1c1410;
    --panel: #2a1f17;
    --panel-2: #33271d;
    --gold: #f0a830;
    --gold-dim: #b8821f;
    --green: #5cb85c;
    --green-tint: rgba(92,184,92,0.12);
    --red: #d9534f;
    --text: #f5e6c8;
    --muted: #b8a888;
    --border: #4a3a2a;
    --on-gold: #1c1410; /* text colour that sits on a gold button */
  }
  /* Light theme — applied when explicitly chosen. */
  :root[data-theme="light"] {
    --bg: #faf4e8;
    --panel: #ffffff;
    --panel-2: #f3ebda;
    --gold: #b8771a;
    --gold-dim: #9a6210;
    --green: #3d8b3d;
    --green-tint: rgba(61,139,61,0.12);
    --red: #c9302c;
    --text: #2a1f17;
    --muted: #7a6a52;
    --border: #e4d8c0;
    --on-gold: #ffffff;
  }
  /* "Auto" follows the device: switch to light vars when the system is light. */
  @media (prefers-color-scheme: light) {
    :root[data-theme="auto"] {
      --bg: #faf4e8;
      --panel: #ffffff;
      --panel-2: #f3ebda;
      --gold: #b8771a;
      --gold-dim: #9a6210;
      --green: #3d8b3d;
      --green-tint: rgba(61,139,61,0.12);
      --red: #c9302c;
      --text: #2a1f17;
      --muted: #7a6a52;
      --border: #e4d8c0;
      --on-gold: #ffffff;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    transition: background-color 0.2s ease, color 0.2s ease;
    padding: 1rem;
    /* Clear the notch / status bar when launched from the Home Screen */
    padding-top: calc(1rem + env(safe-area-inset-top));
    padding-left: calc(1rem + env(safe-area-inset-left));
    padding-right: calc(1rem + env(safe-area-inset-right));
    padding-bottom: calc(1rem + env(safe-area-inset-bottom));
  }
  .wrap { max-width: 760px; margin: 0 auto; position: relative; }
  header { text-align: center; margin-bottom: 1.5rem; }
  .logo { width: 72px; height: 72px; display: block; margin: 0.25rem auto 0.4rem; }
  h1 { color: var(--gold); margin: 0.2rem 0; font-size: 1.8rem; }
  .tagline { color: var(--muted); font-size: 0.95rem; }
  .tip {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--green-tint);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 0.6rem 0.85rem;
    margin-bottom: 1.1rem;
    font-size: 0.9rem;
  }
  .tip span { flex: 1; }
  .tip-close { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0.2rem 0.35rem; line-height: 1; }
  .tip-close:hover { color: var(--text); }
  .theme-toggle {
    position: absolute;
    top: 0;
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 999px;
    padding: 0.4rem 0.7rem;
    font-size: 0.8rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    line-height: 1;
    z-index: 2;
  }
  .theme-toggle:hover { border-color: var(--gold); }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
    transition: background-color 0.2s ease, border-color 0.2s ease;
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0.85rem;
  }
  .field { display: flex; flex-direction: column; }
  .field.full { grid-column: 1 / -1; }
  .field.col2 { grid-column: span 2; }  /* ~1/3 width */
  .field.col3 { grid-column: span 3; }  /* 1/2 width */
  .field.col4 { grid-column: span 4; }  /* ~2/3 width */
  label { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.04em; }
  input, select {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.7rem;
    color: var(--text);
    font-size: 1rem;
  }
  input:focus, select:focus { outline: none; border-color: var(--gold); }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
  button {
    cursor: pointer;
    font-size: 1rem;
    border-radius: 8px;
    border: none;
    padding: 0.7rem 1rem;
    font-weight: 600;
  }
  .btn-add { background: var(--gold); color: var(--on-gold); width: 100%; margin-top: 1rem; }
  .btn-add:hover { background: var(--gold-dim); }
  .btn-clear { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-clear:hover { color: var(--text); }
  .btn-share { background: var(--gold); color: var(--on-gold); border: none; padding: 0.45rem 0.8rem; font-size: 0.85rem; }
  .btn-share:hover { background: var(--gold-dim); }
  .btn-share:disabled { opacity: 0.45; cursor: default; }
  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(1.25rem + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(1.5rem);
    background: var(--gold);
    color: var(--on-gold);
    font-weight: 600;
    font-size: 0.9rem;
    padding: 0.6rem 1rem;
    border-radius: 999px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 0.6rem 0.5rem; text-align: left; font-size: 0.92rem; }
  th { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr.best { background: var(--green-tint); }
  /* Transition used during slide-in / re-ranking (FLIP) animations. */
  tbody tr.animating { transition: transform 0.7s ease, opacity 0.7s ease; }
  /* Fade + slide a row out when it is removed. */
  tbody tr.removing { opacity: 0; transform: translateX(28px); transition: opacity 0.55s ease, transform 0.55s ease; }
  @media (prefers-reduced-motion: reduce) {
    body, .card, tbody tr.animating, tbody tr.removing { transition: none !important; }
  }
  .ppml { font-weight: 700; color: var(--gold); white-space: nowrap; }
  .best-badge { background: var(--green); color: #0c1c0c; font-size: 0.65rem; padding: 0.12rem 0.4rem; border-radius: 4px; margin-left: 0.4rem; vertical-align: middle; font-weight: 700; }
  .type-pill { font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); }
  .del { background: transparent; color: var(--muted); border: none; cursor: pointer; font-size: 1.1rem; padding: 0.2rem 0.4rem; }
  .del:hover { color: var(--red); }
  .empty { text-align: center; color: var(--muted); padding: 2rem 1rem; }
  .results-head { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .results-head h2 { color: var(--gold); font-size: 1.2rem; margin: 0; }
  .head-controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .head-controls select { padding: 0.45rem 0.5rem; font-size: 0.85rem; }
  .units { color: var(--muted); font-size: 0.82rem; }
  .savings { color: var(--green); font-size: 0.8rem; }
  .name-cell { font-weight: 600; }
  .sub { display: block; color: var(--muted); font-size: 0.75rem; font-weight: 400; }
  footer { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 1.5rem; }
  .kofi {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.8rem;
    padding: 0.5rem 1rem;
    background: var(--gold);
    color: var(--on-gold);
    font-weight: 700;
    font-size: 0.9rem;
    border-radius: 999px;
    text-decoration: none;
  }
  .kofi:hover { background: var(--gold-dim); }
  .foot-links { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; margin-bottom: 0.8rem; }
  .foot-links .kofi { margin-bottom: 0; }
  .fb-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 1rem;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.9rem;
    border-radius: 999px;
    text-decoration: none;
  }
  .fb-link:hover { border-color: var(--gold); }
  @media (max-width: 520px) {
    .hide-sm { display: none; }
    /* Compact layout so results sit close to the inputs (less scrolling). */
    .form-grid { gap: 0.55rem; }          /* keep 2 columns, just tighter */
    .card { padding: 0.9rem; margin-bottom: 0.85rem; }
    header { margin-bottom: 0.7rem; }
    .logo { width: 46px; height: 46px; margin: 0.1rem auto 0.25rem; }
    h1 { font-size: 1.3rem; }
    .tagline { font-size: 0.78rem; }
    label { font-size: 0.7rem; margin-bottom: 0.18rem; }
    input, select { padding: 0.5rem 0.55rem; }
    .btn-add { margin-top: 0.55rem; }
    /* Keep the theme toggle clear of the title on narrow phones. */
    .theme-toggle { padding: 0.4rem 0.5rem; font-size: 1rem; }
    .tt-label { display: none; } /* icon-only on small screens */
  }
</style>
</head>
<body>
<div class="wrap">
  <button class="theme-toggle" id="themeBtn" type="button" title="Switch colour theme" aria-label="Switch colour theme"></button>
  <header>
    <img class="logo" src="logo-mark.png" width="72" height="72" alt="The Valuator logo">
    <h1>The Valuator</h1>
    <div class="tagline">Beer Value Calculator — compare beers down to the pence per ml</div>
  </header>

  <div class="tip" id="tip" hidden>
    <span>👋 New here? Pop a couple of beers' prices &amp; sizes in below — we'll crown the best value.</span>
    <button class="tip-close" id="tipClose" type="button" aria-label="Dismiss tip">✕</button>
  </div>

  <div class="card">
    <div class="form-grid">
      <div class="field col4">
        <label for="name">Beer name</label>
        <input id="name" type="text" placeholder="e.g. Punk IPA" autocomplete="off">
      </div>
      <div class="field col2">
        <label for="abv">ABV % (opt)</label>
        <input id="abv" type="number" min="0" step="0.1" placeholder="e.g. 5.6" inputmode="decimal">
      </div>
      <div class="field col3">
        <label for="price">Price (£)</label>
        <input id="price" type="number" min="0" step="0.01" placeholder="e.g. 1.80" inputmode="decimal">
      </div>
      <div class="field col3">
        <label for="volume">Volume (ml)</label>
        <input id="volume" type="number" min="0" step="1" placeholder="e.g. 330" inputmode="numeric" list="common-volumes">
        <datalist id="common-volumes">
          <option value="330">330 ml (standard bottle/can)</option>
          <option value="440">440 ml (tall can)</option>
          <option value="500">500 ml</option>
          <option value="568">568 ml (pint)</option>
          <option value="660">660 ml</option>
        </datalist>
      </div>
      <div class="field col3">
        <label for="type">Container</label>
        <select id="type">
          <option value="Can">Can</option>
          <option value="Bottle">Bottle</option>
        </select>
      </div>
      <div class="field col3">
        <label for="qty">Pack quantity</label>
        <input id="qty" type="number" min="1" step="1" value="1" inputmode="numeric">
      </div>
    </div>
    <button class="btn-add" id="addBtn">Add beer</button>
  </div>

  <div class="card">
    <div class="results-head">
      <h2>Results</h2>
      <div class="head-controls">
        <select id="unitMode" title="Choose how value is shown">
          <option value="ml">pence / ml</option>
          <option value="100ml">pence / 100 ml</option>
          <option value="pint">price / pint (568 ml)</option>
        </select>
        <button class="btn-share" id="shareBtn" title="Share this comparison">📤 Share</button>
        <button class="btn-share" id="imageBtn" title="Share as an image">🖼️ Image</button>
        <button class="btn-clear" id="clearBtn">Clear all</button>
      </div>
    </div>
    <div id="results"></div>
  </div>

  <footer>
    <div class="foot-links">
      <a class="kofi" id="kofiBtn" href="#" target="_blank" rel="noopener" hidden>🍺 Buy me a beer</a>
      <a class="fb-link" id="fbBtn" href="#" target="_blank" rel="noopener" hidden>📘 Follow for updates</a>
    </div>
    <div>Best value is highlighted. Prices saved in your browser only.</div>
  </footer>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "beerValueCalc.v1";
  var TIP_KEY = "beerValueCalc.seenTip";
  var UNIT_KEY = "beerValueCalc.unit";
  var THEME_KEY = "beerValueCalc.theme";
  var ML_PER_PINT = 568.261; // UK imperial pint
  var THEMES = ["auto", "light", "dark"]; // cycle order
  var THEME_INFO = {
    auto: { label: "Auto", icon: "🌗" },
    light: { label: "Light", icon: "☀️" },
    dark: { label: "Dark", icon: "🌙" }
  };
  var beers = load();
  var unitMode = loadUnit();
  var theme = loadTheme();

  // --- GoatCounter analytics (event tracking) ---
  // Set this to your GoatCounter code, e.g. "thevaluator" for
  // https://thevaluator.goatcounter.com — leave "" to disable.
  var GC_CODE = "thevaluator";

  (function loadGoatCounter() {
    if (!GC_CODE) return;
    var s = document.createElement("script");
    s.async = true;
    s.src = "//gc.zgo.at/count.js";
    s.setAttribute("data-goatcounter", "https://" + GC_CODE + ".goatcounter.com/count");
    document.head.appendChild(s);
  })();

  // --- Ko-fi "Buy me a beer" tip button ---
  // Set this to your Ko-fi username (the bit after ko-fi.com/), or "" to hide.
  var KOFI_USER = "thevaluator";

  (function setupKofi() {
    if (!KOFI_USER) return;
    var b = document.getElementById("kofiBtn");
    if (!b) return;
    b.href = "https://ko-fi.com/" + KOFI_USER;
    b.hidden = false;
    b.addEventListener("click", function () { gcEvent("kofi/click", "Buy me a beer"); });
  })();

  // --- Facebook "Follow for updates" link ---
  // Full URL of your Facebook page, or "" to hide.
  var FB_URL = "https://www.facebook.com/TheValuator/";

  (function setupFacebook() {
    if (!FB_URL) return;
    var b = document.getElementById("fbBtn");
    if (!b) return;
    b.href = FB_URL;
    b.hidden = false;
    b.addEventListener("click", function () { gcEvent("facebook/click", "Follow on Facebook"); });
  })();

  // Record a custom event (no-op until GC_CODE is set and the script loads).
  function gcEvent(path, title) {
    try {
      if (window.goatcounter && window.goatcounter.count) {
        window.goatcounter.count({ path: path, title: title || path, event: true });
      }
    } catch (e) { /* analytics must never break the app */ }
  }

  // Animation state
  var countedIds = {};    // ids whose value has run its count-up
  var isFirstRender = true;

  function reduceMotion() {
    return window.matchMedia &&
      window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  }

  var els = {
    name: document.getElementById("name"),
    type: document.getElementById("type"),
    abv: document.getElementById("abv"),
    price: document.getElementById("price"),
    volume: document.getElementById("volume"),
    qty: document.getElementById("qty"),
    addBtn: document.getElementById("addBtn"),
    tip: document.getElementById("tip"),
    tipClose: document.getElementById("tipClose"),
    clearBtn: document.getElementById("clearBtn"),
    unitMode: document.getElementById("unitMode"),
    themeBtn: document.getElementById("themeBtn"),
    shareBtn: document.getElementById("shareBtn"),
    imageBtn: document.getElementById("imageBtn"),
    toast: document.getElementById("toast"),
    results: document.getElementById("results")
  };

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(beers));
    } catch (e) { /* storage may be unavailable; ignore */ }
  }

  function loadUnit() {
    try {
      var u = localStorage.getItem(UNIT_KEY);
      return (u === "100ml" || u === "pint") ? u : "ml";
    } catch (e) {
      return "ml";
    }
  }

  function saveUnit() {
    try { localStorage.setItem(UNIT_KEY, unitMode); } catch (e) { /* ignore */ }
  }

  function loadTheme() {
    try {
      var t = localStorage.getItem(THEME_KEY);
      return THEMES.indexOf(t) !== -1 ? t : "auto";
    } catch (e) {
      return "auto";
    }
  }

  // Resolve "auto" to the actual light/dark the system is currently showing.
  function resolvedTheme() {
    if (theme !== "auto") return theme;
    return (window.matchMedia &&
      window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
  }

  function applyTheme() {
    document.documentElement.setAttribute("data-theme", theme);
    var info = THEME_INFO[theme];
    els.themeBtn.innerHTML = info.icon + '<span class="tt-label">' + info.label + '</span>';
    // Keep the browser/status-bar chrome colour in step with the theme.
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute("content", resolvedTheme() === "light" ? "#faf4e8" : "#1c1410");
  }

  function cycleTheme() {
    theme = THEMES[(THEMES.indexOf(theme) + 1) % THEMES.length];
    try { localStorage.setItem(THEME_KEY, theme); } catch (e) { /* ignore */ }
    applyTheme();
  }

  // Pence per ml = (price in pounds * 100) / total volume in ml
  function pencePerMl(beer) {
    var totalMl = beer.volume * beer.qty;
    if (totalMl <= 0) return Infinity;
    return (beer.price * 100) / totalMl;
  }

  // Pence per UK unit of alcohol. 1 unit = 10 ml of pure ethanol.
  // pure ethanol ml = totalMl * abv/100; units = that / 10
  function pencePerUnit(beer) {
    if (!beer.abv || beer.abv <= 0) return null;
    var totalMl = beer.volume * beer.qty;
    var units = (totalMl * (beer.abv / 100)) / 10;
    if (units <= 0) return null;
    return (beer.price * 100) / units;
  }

  // Hide the first-run tip and remember it's been seen.
  function dismissTip() {
    if (els.tip) els.tip.hidden = true;
    try { localStorage.setItem(TIP_KEY, "1"); } catch (e) { /* ignore */ }
  }

  function addBeer() {
    var price = parseFloat(els.price.value);
    var volume = parseFloat(els.volume.value);
    var qty = parseInt(els.qty.value, 10);
    var abv = parseFloat(els.abv.value);

    if (!(price > 0)) { flash(els.price); return; }
    if (!(volume > 0)) { flash(els.volume); return; }
    if (!(qty > 0)) { qty = 1; }

    beers.push({
      id: Date.now() + "-" + Math.random().toString(36).slice(2, 7),
      name: els.name.value.trim() || "Unnamed beer",
      type: els.type.value,
      abv: isNaN(abv) ? null : abv,
      price: price,
      volume: volume,
      qty: qty
    });

    save();
    render();
    dismissTip();
    resetForm();
    els.name.focus();
  }

  function resetForm() {
    els.name.value = "";
    els.abv.value = "";
    els.price.value = "";
    els.volume.value = "";
    els.qty.value = "1";
  }

  function flash(el) {
    el.style.borderColor = "#d9534f";
    el.focus();
    setTimeout(function () { el.style.borderColor = ""; }, 1200);
  }

  function actuallyRemove(id) {
    beers = beers.filter(function (b) { return b.id !== id; });
    delete countedIds[id];
    save();
    render();
  }

  function removeBeer(id) {
    var row = els.results.querySelector('tr[data-id="' + id + '"]');
    if (!row || reduceMotion()) { actuallyRemove(id); return; }
    // Fade the row out, then drop it from the data and re-render (others FLIP up).
    var done = false;
    function finish() { if (done) return; done = true; actuallyRemove(id); }
    row.addEventListener("transitionend", finish);
    setTimeout(finish, 750); // fallback in case transitionend doesn't fire
    row.classList.add("removing");
  }

  function clearAll() {
    if (beers.length && !confirm("Remove all beers?")) return;
    beers = [];
    save();
    render();
  }

  function fmtMoney(pounds) {
    return "£" + pounds.toFixed(2);
  }

  // Format a pence-per-ml figure according to the selected display unit.
  function fmtValue(ppml) {
    if (unitMode === "pint") {
      // price of one pint in pounds = ppml (pence/ml) * ml-per-pint / 100
      return "£" + ((ppml * ML_PER_PINT) / 100).toFixed(2) + "/pint";
    }
    if (unitMode === "100ml") {
      return (ppml * 100).toFixed(1) + "p/100ml";
    }
    return ppml.toFixed(3) + "p/ml";
  }

  function valueLabel() {
    if (unitMode === "pint") return "Value (per pint)";
    if (unitMode === "100ml") return "Value (per 100ml)";
    return "Value (per ml)";
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // Animate the displayed value ticking up from 0 to its target.
  function animateCount(el, target, dur) {
    var start = null;
    function frame(now) {
      if (start === null) start = now;
      var t = Math.min(1, (now - start) / dur);
      var eased = 1 - Math.pow(1 - t, 2); // gentle ease-out (quad) — counts more evenly
      el.textContent = fmtValue(target * eased);
      if (t < 1) requestAnimationFrame(frame);
      else el.textContent = fmtValue(target);
    }
    requestAnimationFrame(frame);
  }

  // Clean up inline animation styles once a row's transition finishes.
  function clearAnimating(row) {
    function cleanup() {
      row.classList.remove("animating");
      row.style.transform = "";
      row.style.opacity = "";
      row.removeEventListener("transitionend", cleanup);
    }
    row.addEventListener("transitionend", cleanup);
    setTimeout(cleanup, 900);
  }

  // FLIP re-ranking for moved rows + slide-in for newly added rows.
  function runRowAnimations(oldRects) {
    var rows = els.results.querySelectorAll("tbody tr[data-id]");
    Array.prototype.forEach.call(rows, function (row) {
      var id = row.getAttribute("data-id");
      var old = oldRects[id];
      if (old) {
        var dy = old.top - row.getBoundingClientRect().top;
        if (!dy) return;
        row.style.transform = "translateY(" + dy + "px)"; // start at old spot
        requestAnimationFrame(function () {
          row.classList.add("animating");
          row.style.transform = "";            // glide to new spot
          clearAnimating(row);
        });
      } else if (!isFirstRender) {
        row.style.opacity = "0";
        row.style.transform = "translateY(-10px)";
        requestAnimationFrame(function () {
          row.classList.add("animating");
          row.style.opacity = "";
          row.style.transform = "";
          clearAnimating(row);
        });
      }
    });
  }

  // Count up any value cells that haven't animated yet.
  function runCountUp() {
    if (reduceMotion()) return;
    var spans = els.results.querySelectorAll(".ppml[data-ppml]");
    Array.prototype.forEach.call(spans, function (span) {
      var id = span.getAttribute("data-row");
      if (countedIds[id]) return;
      countedIds[id] = true;
      var target = parseFloat(span.getAttribute("data-ppml"));
      if (isFinite(target)) animateCount(span, target, 1600);
    });
  }

  function render() {
    // Capture current row positions for FLIP before we rebuild the table.
    var oldRects = {};
    Array.prototype.forEach.call(els.results.querySelectorAll("tbody tr[data-id]"),
      function (row) { oldRects[row.getAttribute("data-id")] = row.getBoundingClientRect(); });

    els.shareBtn.disabled = beers.length === 0;
    els.imageBtn.disabled = beers.length === 0;

    if (!beers.length) {
      els.results.innerHTML = '<div class="empty">No beers yet — add one above to start comparing.</div>';
      isFirstRender = false;
      return;
    }

    // Sort cheapest pence/ml first
    var sorted = beers.slice().sort(function (a, b) {
      return pencePerMl(a) - pencePerMl(b);
    });

    var bestPpml = pencePerMl(sorted[0]);
    var worstPpml = pencePerMl(sorted[sorted.length - 1]);

    var rows = sorted.map(function (b, i) {
      var ppml = pencePerMl(b);
      var ppu = pencePerUnit(b);
      var isBest = i === 0;
      var totalMl = b.volume * b.qty;

      var packInfo = b.qty > 1
        ? (b.qty + " × " + b.volume + " ml = " + totalMl + " ml")
        : (b.volume + " ml");

      var savingsCell = "";
      if (!isBest && worstPpml > bestPpml) {
        var pctVsBest = ((ppml - bestPpml) / bestPpml) * 100;
        savingsCell = '<span class="savings">+' + pctVsBest.toFixed(0) + '% vs best</span>';
      }

      var abvText = b.abv ? (b.abv.toFixed(1) + "% ABV") : "";
      var ppuText = ppu != null ? (ppu.toFixed(1) + "p / unit") : "";
      var metaBits = [abvText, ppuText].filter(Boolean).join(" · ");

      return '<tr data-id="' + b.id + '" class="' + (isBest ? "best" : "") + '">' +
        '<td class="name-cell">' + esc(b.name) +
          (isBest ? '<span class="best-badge">BEST</span>' : '') +
          (metaBits ? '<span class="sub">' + esc(metaBits) + '</span>' : '') +
        '</td>' +
        '<td class="hide-sm"><span class="type-pill">' + esc(b.type) + '</span></td>' +
        '<td class="hide-sm">' + fmtMoney(b.price) + '<span class="sub">' + esc(packInfo) + '</span></td>' +
        '<td><span class="ppml" data-ppml="' + ppml + '" data-row="' + b.id + '">' + fmtValue(ppml) + '</span>' +
          (savingsCell ? '<span class="sub">' + savingsCell + '</span>' : '') +
        '</td>' +
        '<td style="text-align:right"><button class="del" data-id="' + b.id + '" title="Remove">✕</button></td>' +
      '</tr>';
    }).join("");

    els.results.innerHTML =
      '<table><thead><tr>' +
        '<th>Beer</th>' +
        '<th class="hide-sm">Type</th>' +
        '<th class="hide-sm">Price / size</th>' +
        '<th>' + esc(valueLabel()) + '</th>' +
        '<th></th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';

    Array.prototype.forEach.call(els.results.querySelectorAll(".del"), function (btn) {
      btn.addEventListener("click", function () { removeBeer(btn.getAttribute("data-id")); });
    });

    if (!reduceMotion()) runRowAnimations(oldRects);
    runCountUp();
    isFirstRender = false;
  }

  var toastTimer = null;
  function showToast(msg) {
    els.toast.textContent = msg;
    els.toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { els.toast.classList.remove("show"); }, 2200);
  }

  // Build a plain-text summary of the current comparison for sharing.
  function buildShareText() {
    var sorted = beers.slice().sort(function (a, b) {
      return pencePerMl(a) - pencePerMl(b);
    });
    var lines = ["🍺 Beer value comparison — The Valuator", ""];
    sorted.slice(0, 5).forEach(function (b, i) {
      var medal = i === 0 ? "🥇" : (i + 1) + ".";
      lines.push(medal + " " + b.name + " — " + fmtValue(pencePerMl(b)));
    });
    if (sorted.length > 5) lines.push("…and " + (sorted.length - 5) + " more");
    lines.push("", "Compare yours 👉 https://thevaluator.app");
    return lines.join("\n");
  }

  function shareResults() {
    if (!beers.length) return;
    var text = buildShareText();
    var shareData = {
      title: "The Valuator — beer value comparison",
      text: text,
      url: "https://thevaluator.app"
    };
    if (navigator.share) {
      navigator.share(shareData).then(function () {
        gcEvent("share/native", "Share (native sheet)");
      }).catch(function () { /* user cancelled — ignore */ });
    } else if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        showToast("Comparison copied to clipboard");
        gcEvent("share/copy", "Share (copied to clipboard)");
      }).catch(function () { showToast("Couldn't copy — try again"); });
    } else {
      showToast("Sharing isn't supported on this browser");
    }
  }

  // ---- Shareable image card (drawn on a canvas, 1080×1080) ----
  var FS = '-apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
  var _logoImg = null;

  function getLogo() {
    if (_logoImg) return Promise.resolve(_logoImg);
    return new Promise(function (resolve) {
      var img = new Image();
      img.onload = function () { _logoImg = img; resolve(img); };
      img.onerror = function () { resolve(null); };
      img.src = "logo-mark.png";
    });
  }

  function roundRect(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function fitText(ctx, text, maxW) {
    if (ctx.measureText(text).width <= maxW) return text;
    var t = text;
    while (t.length > 1 && ctx.measureText(t + "…").width > maxW) t = t.slice(0, -1);
    return t + "…";
  }

  function sizeLabel(b) {
    var unit = (b.type || "").toLowerCase();
    if (b.qty > 1) return b.qty + " × " + b.volume + " ml " + unit + "s";
    return b.volume + " ml " + unit;
  }

  function unitWord() {
    if (unitMode === "pint") return "price per pint";
    if (unitMode === "100ml") return "pence per 100 ml";
    return "pence per ml";
  }

  function drawCardRow(ctx, b, i, y, rh) {
    var best = i === 0;
    var innerH = rh - 18;
    var cy = y + innerH / 2;

    ctx.fillStyle = best ? "#2c3a25" : "#2a1f17";
    roundRect(ctx, 60, y, 960, innerH, 20); ctx.fill();

    // rank disc
    var dx = 132;
    ctx.beginPath(); ctx.arc(dx, cy, 38, 0, Math.PI * 2);
    if (best) { ctx.fillStyle = "#f0a830"; ctx.fill(); ctx.fillStyle = "#1c1410"; }
    else { ctx.strokeStyle = "#5a4832"; ctx.lineWidth = 3; ctx.stroke(); ctx.fillStyle = "#b9a888"; }
    ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.font = "bold 40px " + FS;
    ctx.fillText(String(i + 1), dx, cy + 2);
    ctx.textBaseline = "alphabetic";

    // value (right) — drawn first so we know its left edge
    var valText = fmtValue(pencePerMl(b));
    ctx.textAlign = "right"; ctx.font = "bold 50px " + FS;
    ctx.fillStyle = best ? "#f0a830" : "#f5c46e";
    ctx.fillText(valText, 1000, cy + 18);
    var valLeft = 1000 - ctx.measureText(valText).width;

    // name (truncated to fit, leaving room for value + BEST badge)
    ctx.textAlign = "left"; ctx.font = "bold 42px " + FS; ctx.fillStyle = "#f5e6c8";
    var nameMaxW = (valLeft - 30) - 196 - (best ? 110 : 0);
    var nameText = fitText(ctx, b.name, nameMaxW);
    ctx.fillText(nameText, 196, cy - 4);

    if (best) {
      var bx = 196 + ctx.measureText(nameText).width + 16, by = cy - 32;
      ctx.font = "bold 22px " + FS;
      var bw = ctx.measureText("BEST").width + 26;
      ctx.fillStyle = "#5cb85c"; roundRect(ctx, bx, by, bw, 34, 17); ctx.fill();
      ctx.fillStyle = "#0c1c0c"; ctx.fillText("BEST", bx + 13, by + 24);
    }

    // size sub-line
    ctx.font = "28px " + FS; ctx.fillStyle = "#b9a888"; ctx.textAlign = "left";
    ctx.fillText(sizeLabel(b), 196, cy + 34);
  }

  function buildCardCanvas() {
    return getLogo().then(function (logo) {
      var c = document.createElement("canvas");
      c.width = 1080; c.height = 1080;
      var ctx = c.getContext("2d");

      // background
      var g = ctx.createLinearGradient(0, 0, 0, 1080);
      g.addColorStop(0, "#2e2117"); g.addColorStop(1, "#14110b");
      ctx.fillStyle = g; ctx.fillRect(0, 0, 1080, 1080);

      if (logo) ctx.drawImage(logo, 480, 56, 120, 120);

      // header
      ctx.textAlign = "center";
      ctx.fillStyle = "#f5e6c8"; ctx.font = "bold 46px " + FS;
      ctx.fillText("BEER VALUE COMPARISON", 540, 230);
      ctx.fillStyle = "#b9a888"; ctx.font = "28px " + FS;
      ctx.fillText("ranked best value first  ·  " + unitWord(), 540, 278);

      // rows
      var sorted = beers.slice().sort(function (a, b) { return pencePerMl(a) - pencePerMl(b); });
      var shown = sorted.slice(0, 5);
      var top = 330, rh = 132;
      shown.forEach(function (b, i) { drawCardRow(ctx, b, i, top + i * rh, rh); });
      if (sorted.length > 5) {
        ctx.textAlign = "center"; ctx.fillStyle = "#b9a888"; ctx.font = "28px " + FS;
        ctx.fillText("…and " + (sorted.length - 5) + " more", 540, top + shown.length * rh + 24);
      }

      // footer pill
      ctx.font = "bold 38px " + FS;
      var url = "thevaluator.app", uw = ctx.measureText(url).width;
      var pw = uw + 88, ph = 76, px = (1080 - pw) / 2, py = 958;
      ctx.fillStyle = "#f0a830"; roundRect(ctx, px, py, pw, ph, ph / 2); ctx.fill();
      ctx.fillStyle = "#1c1410"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(url, 540, py + ph / 2 + 2); ctx.textBaseline = "alphabetic";

      return c;
    });
  }

  function shareImage() {
    if (!beers.length) return;
    els.imageBtn.disabled = true;
    buildCardCanvas().then(function (canvas) {
      canvas.toBlob(function (blob) {
        els.imageBtn.disabled = false;
        if (!blob) { showToast("Couldn't create the image"); return; }
        var file = new File([blob], "the-valuator.png", { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
          navigator.share({
            files: [file],
            title: "The Valuator",
            text: "My beer value comparison — thevaluator.app"
          }).then(function () { gcEvent("share/image", "Share (image)"); })
            .catch(function () { /* cancelled */ });
        } else {
          // desktop / unsupported: download the PNG
          var u = URL.createObjectURL(blob);
          var a = document.createElement("a");
          a.href = u; a.download = "the-valuator.png";
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(function () { URL.revokeObjectURL(u); }, 1000);
          showToast("Image saved");
          gcEvent("share/image-download", "Image downloaded");
        }
      }, "image/png");
    });
  }

  els.addBtn.addEventListener("click", addBeer);
  els.clearBtn.addEventListener("click", clearAll);
  els.shareBtn.addEventListener("click", shareResults);
  els.imageBtn.addEventListener("click", shareImage);

  // First-run tip: show once for brand-new visitors with no saved beers.
  els.tipClose.addEventListener("click", dismissTip);
  (function setupTip() {
    var seen;
    try { seen = localStorage.getItem(TIP_KEY); } catch (e) { /* ignore */ }
    if (!seen && !beers.length) els.tip.hidden = false;
  })();

  els.themeBtn.addEventListener("click", cycleTheme);
  applyTheme();
  // When in Auto, follow live system theme changes (keeps chrome colour in sync).
  if (window.matchMedia) {
    window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", function () {
      if (theme === "auto") applyTheme();
    });
  }

  els.unitMode.value = unitMode;
  els.unitMode.addEventListener("change", function () {
    unitMode = els.unitMode.value;
    saveUnit();
    countedIds = {}; // re-run the count-up so values tick to the new unit
    render();
  });

  // Enter key submits from any input
  Array.prototype.forEach.call(document.querySelectorAll("input"), function (input) {
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); addBeer(); }
    });
  });

  render();
})();
</script>
