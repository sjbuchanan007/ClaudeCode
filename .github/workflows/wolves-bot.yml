name: wolves-bot

on:
  # Runs 3x/hour at odd minutes. GitHub's scheduled cron is best-effort and
  # frequently delays or drops runs (worst at :00 and round 5/10-min marks), so
  # we run often and let bot.py catch up any slot a dropped run missed -- it
  # tracks what's been posted in state.json, so nothing repeats.
  schedule:
    - cron: "7,27,47 * * * *"
  # Lets you trigger a run by hand from the Actions tab (handy for testing).
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Plan only, don't actually post"
        type: boolean
        default: false
      force:
        description: "Post immediately, ignoring the schedule (for testing)"
        type: boolean
        default: false

# Needed so the workflow can commit state.json back to the repo.
permissions:
  contents: write

# Serialise runs so two never race on committing state.json.
concurrency:
  group: wolves-bot
  cancel-in-progress: false

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r wolves-bot/requirements.txt

      - name: Run the bot
        working-directory: wolves-bot
        env:
          # X (Twitter)
          CONSUMER_KEY: ${{ secrets.CONSUMER_KEY }}
          CONSUMER_SECRET: ${{ secrets.CONSUMER_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          # Mastodon (add these secrets once your account is ready)
          MASTODON_API_BASE_URL: ${{ secrets.MASTODON_API_BASE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          # Bluesky (add these secrets once your account is ready)
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          FORCE_POST: ${{ inputs.force && '1' || '0' }}
        run: python bot.py

      - name: Save posting state
        working-directory: wolves-bot
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "wolves-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "Update posting state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
